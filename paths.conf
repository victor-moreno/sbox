# paths.conf — paths exposed inside the sandbox.
#
# Edit RW/RO arrays to add or remove paths. $HOME and other env vars are
# expanded. Files vs. directories are auto-detected. Nonexistent paths are
# silently skipped, so it's fine to list things only one of your machines has.
#
# Always exposed (handled by the platform scripts, not configurable here):
#   - $PWD (the project directory): full read+write
#   - system dirs (/usr, /etc, /opt, homebrew on macOS, conda on Linux): RO
#
# Linux note: ~/.claude is bound RW, but its conversation-history subdirs
# (projects/, session-env/, tasks/) and ~/.cache/claude are per-project
# bind-mounts into $PWD/.claude/, so each project's transcripts stay
# isolated. Global state (CLAUDE.md, agents/, commands/, settings.json)
# remains writable and shared across sandboxes. ~/.claude.json is shared
# RW so credentials work everywhere.

# Read+write inside sandbox
RW=(
  "$HOME/.cache"
  "$HOME/.config"
  "$HOME/.claude"
  "$HOME/.claude.json"
)

# Read-only inside sandbox
RO=(
  "$HOME/bin"
  "$HOME/vic/vm/sync/bin"
  "$HOME/.local"
  "$HOME/.gitconfig"
  "$HOME/.gitignore_global"
  "$HOME/.Rprofile"
  "$HOME/Library/R"
)
