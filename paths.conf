# paths.conf — paths exposed inside the sandbox.
#
# Edit RW/RO arrays to add or remove paths. $HOME and other env vars are
# expanded. Files vs. directories are auto-detected. Nonexistent paths are
# silently skipped, so it's fine to list things only one of your machines has.
#
# Always exposed (handled by the platform scripts, not configurable here):
#   - $PWD (the project directory): full read+write
#   - system dirs (/usr, /etc, /opt, homebrew on macOS, conda on Linux): RO

# Read+write inside sandbox (applies to all coders)
RW=(
  "$HOME/.cache"
  "$HOME/.config"
  "$HOME/Library/Keychains"   # macOS: coder credential storage
)

# Read-only inside sandbox (applies to all coders)
RO=(
  "$HOME/bin"
  "$HOME/vic/vm/sync/bin"
  "$HOME/.local"
  "$HOME/.gitconfig"
  "$HOME/.gitignore_global"
  "$HOME/.Rprofile"
  "$HOME/Library/R"
  "/share"                    # Linux cluster software (skipped elsewhere)
)

# Coder-specific RW paths, keyed by CODER_RW_<codername> variables.
# Paths are newline-delimited to support spaces in paths.
# Nonexistent paths are skipped.
# For any coder not listed here, ~/.<coder> and ~/.<coder>.json are tried.
CODER_RW_CLAUDE="$(printf '%s\n%s\n' "$HOME/.claude" "$HOME/.claude.json")"
CODER_RW_QWEN="$HOME/.qwen"

# Per-project isolation: coders whose conversation history is isolated per project.
# On Linux this uses bind-mounts; on macOS symlinks are used (see lib/macos.sh).
CODER_PROJECT_ISOLATION="claude"

# Entries prepended to PATH inside the sandboxed shell, in order.
PATH_EXTRA=(
  "$HOME/.local/bin"
  "$HOME/bin"
  "$HOME/.local/python3/bin"
)

# Python virtualenv activate script sourced at shell startup (leave empty to
# skip). macOS shell mode only; on Linux the conda env is activated instead.
PYTHON_VENV="$HOME/.local/python3/bin/activate"

# History file for the sandboxed shell. Leave empty to disable.
# On Linux it must live under a RW entry (e.g. "$HOME/.cache/sandbox_history").
SANDBOX_HISTFILE=""

# Coder tunnel configuration.
# Format: CODER_TUNNEL_<codername>="<hostname>=<url>"
# The env var ANTHROPIC_BASE_URL (or coder-specific equivalent) is set when
# the machine hostname matches.
CODER_TUNNEL_CLAUDE="mmini-ICO.local=http://localhost:9443"
